name: Release

on:
  push:
    tags:
      - 'v*' # Aciona o workflow quando uma tag começando com 'v' for criada (ex: v1.0.0)

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable_name: lms
            asset_name: lms-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            executable_name: lms.exe
            asset_name: lms-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename executable
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.executable_name }} ${{ matrix.asset_name }}

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
